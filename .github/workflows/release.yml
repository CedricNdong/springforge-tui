name: Release Native Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Build native binaries for each platform
  # ──────────────────────────────────────────────
  build-native:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            artifact: springforge-linux-x86_64
          - name: macos-aarch64
            os: macos-14
            artifact: springforge-macos-aarch64

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build native image
        run: ./gradlew :springforge-cli:nativeCompile -PreleaseVersion=${GITHUB_REF_NAME#v}

      - name: Rename binary
        run: mv springforge-cli/build/native/nativeCompile/springforge springforge-cli/build/native/nativeCompile/${{ matrix.artifact }}

      - name: Smoke test — version
        run: ./springforge-cli/build/native/nativeCompile/${{ matrix.artifact }} --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: springforge-cli/build/native/nativeCompile/${{ matrix.artifact }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Create GitHub Release with all binaries
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build-native

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x release-assets/springforge-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/springforge-linux-x86_64
            release-assets/springforge-macos-aarch64
            install.sh
